{{message}}


<form name="questionForm">

<input  type="text"  name="qno" [(ngModel)]="question.qno"><br><br>


<input  type="text"  name="qtext" [(ngModel)]="question.qtext" size="50px"><br><br>
<br><br>

<input  name="options" type="radio" (change)="saveAnswer()" [(ngModel)]="submittedAnswer" [value]="question.op1"><span>{{question.op1}}</span><br><br>
<input  name="options" type="radio"(change)="saveAnswer()" [(ngModel)]="submittedAnswer" [value]="question.op2"><span>{{question.op2}}</span><br><br>
<input name ="options" type="radio"(change)="saveAnswer()" [(ngModel)]="submittedAnswer" [value]="question.op3"><span>{{question.op2}}</span><br><br>
<input name="options" type="radio"(change)="saveAnswer()" [(ngModel)]="submittedAnswer" [value]="question.op4"> <span>{{question.op2}}</span><br><br>
<input  [(ngModel)]="question.answer"><br><br>

<input name="button" value="next" (click)="nextQuestion()">
<input name="button" value="previousQuestion" (click)="previousQuestion()">

<input name="button" value="endexam" (click)="endexam()">

</form>
